<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nesta Player</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0f;
    --surface:#13131a;
    --surface2:#1c1c28;
    --surface3:#252535;
    --accent:#c084fc;
    --accent2:#818cf8;
    --accent3:#34d399;
    --text:#f1f0ff;
    --text2:#a09ec4;
    --text3:#5e5c7a;
    --border:#2a2840;
    --r:14px;
    --r2:10px;
    --r3:50px;
  }
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
    display:grid;
    grid-template-columns:320px 1fr;
    grid-template-rows:1fr 120px;
    height:100vh;
    position:relative;
  }
  /* Aurora background */
  body::before{
    content:'';
    position:fixed;inset:0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(192,132,252,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(52,211,153,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 60% 30%, rgba(129,140,248,0.05) 0%, transparent 50%);
    pointer-events:none;z-index:0;
    animation:aurora 12s ease-in-out infinite alternate;
  }
  @keyframes aurora{
    0%{opacity:1}50%{opacity:.6}100%{opacity:1}
  }

  /* ── Sidebar ── */
  #sidebar{
    grid-column:1;grid-row:1;
    background:var(--surface);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    z-index:1;position:relative;
    overflow:hidden;
  }
  #sidebar-header{
    padding:24px 20px 16px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--border);
  }
  .app-title{
    font-size:18px;font-weight:700;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    letter-spacing:-.4px;
  }
  #add-btn{
    background:var(--surface3);border:1px solid var(--border);
    color:var(--text);border-radius:var(--r2);
    padding:8px 14px;font-size:13px;cursor:pointer;
    display:flex;align-items:center;gap:6px;
    transition:all .2s;
  }
  #add-btn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent)}
  #file-input{display:none}

  #playlist{
    flex:1;overflow-y:auto;padding:8px;
  }
  #playlist::-webkit-scrollbar{width:4px}
  #playlist::-webkit-scrollbar-track{background:transparent}
  #playlist::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

  .empty-state{
    padding:40px 20px;text-align:center;color:var(--text3);
    display:flex;flex-direction:column;align-items:center;gap:12px;
  }
  .empty-state svg{opacity:.3}
  .empty-state p{font-size:14px;line-height:1.6}

  .track-item{
    padding:10px 12px;border-radius:var(--r2);
    cursor:pointer;display:flex;align-items:center;gap:10px;
    transition:background .15s;margin-bottom:2px;
    position:relative;
  }
  .track-item:hover{background:var(--surface2)}
  .track-item.active{background:var(--surface3)}
  .track-item.active::before{
    content:'';position:absolute;left:0;top:25%;bottom:25%;
    width:3px;background:var(--accent);border-radius:99px;
  }
  .track-num{
    width:20px;text-align:center;font-size:12px;color:var(--text3);flex-shrink:0;
  }
  .track-item.active .track-num{color:var(--accent)}
  .track-icon{
    width:36px;height:36px;border-radius:8px;
    background:linear-gradient(135deg,var(--surface3),var(--surface2));
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    font-size:14px;color:var(--text3);border:1px solid var(--border);
  }
  .track-item.active .track-icon{
    background:linear-gradient(135deg,rgba(192,132,252,.25),rgba(129,140,248,.15));
    color:var(--accent);border-color:rgba(192,132,252,.3);
  }
  .track-info{flex:1;min-width:0}
  .track-name{
    font-size:13px;font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    color:var(--text);
  }
  .track-item.active .track-name{color:var(--accent)}
  .track-dur{font-size:11px;color:var(--text3);margin-top:2px}
  .track-del{
    opacity:0;font-size:16px;color:var(--text3);cursor:pointer;
    flex-shrink:0;width:20px;text-align:center;
    transition:opacity .15s,color .15s;
    background:none;border:none;
  }
  .track-item:hover .track-del{opacity:1}
  .track-del:hover{color:#f87171}

  /* ── Main ── */
  #main{
    grid-column:2;grid-row:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:1;position:relative;padding:32px;gap:28px;
  }

  /* Canvas Visualizer */
  #vis-wrap{
    position:relative;width:100%;max-width:400px;
    display:flex;justify-content:center;
  }
  #visualizer{
    width:100%;max-width:400px;height:200px;
    border-radius:20px;
    background:var(--surface);
    border:1px solid var(--border);
    display:block;
  }
  .cover-ring{
    position:absolute;
    top:50%;left:50%;transform:translate(-50%,-50%);
    width:120px;height:120px;
    border-radius:50%;
    background:linear-gradient(145deg,var(--surface3),var(--surface));
    border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 8px rgba(192,132,252,.06), 0 0 0 16px rgba(192,132,252,.03);
    transition:all .4s;
  }
  .cover-ring.spinning{animation:spin 4s linear infinite}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
  .cover-inner{
    width:80px;height:80px;border-radius:50%;
    background:linear-gradient(135deg,rgba(192,132,252,.3),rgba(52,211,153,.2));
    display:flex;align-items:center;justify-content:center;
    font-size:28px;
  }
  .vinyl-hole{
    width:16px;height:16px;border-radius:50%;
    background:var(--bg);
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  }

  #now-playing{text-align:center;max-width:360px;width:100%}
  #track-title{
    font-size:22px;font-weight:700;letter-spacing:-.5px;
    color:var(--text);margin-bottom:4px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  #track-sub{font-size:14px;color:var(--text2)}

  /* Progress */
  #progress-wrap{width:100%;max-width:400px}
  .time-row{
    display:flex;justify-content:space-between;
    font-size:11px;color:var(--text3);margin-bottom:6px;font-variant-numeric:tabular-nums;
  }
  #seek{
    width:100%;height:4px;
    -webkit-appearance:none;appearance:none;
    background:var(--surface3);border-radius:99px;cursor:pointer;
    outline:none;
  }
  #seek::-webkit-slider-thumb{
    -webkit-appearance:none;width:14px;height:14px;
    border-radius:50%;background:var(--accent);cursor:pointer;
    box-shadow:0 0 8px rgba(192,132,252,.5);
    transition:transform .15s;
  }
  #seek:hover::-webkit-slider-thumb{transform:scale(1.2)}
  #seek-fill{
    height:4px;border-radius:99px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    pointer-events:none;margin-bottom:-4px;
    transition:width .1s linear;
  }
  .seek-container{position:relative}

  /* Controls */
  #controls{
    display:flex;align-items:center;gap:20px;
  }
  .ctrl-btn{
    background:none;border:none;cursor:pointer;
    color:var(--text2);display:flex;align-items:center;justify-content:center;
    border-radius:50%;width:40px;height:40px;
    transition:all .15s;
  }
  .ctrl-btn:hover{color:var(--text);background:var(--surface2)}
  .ctrl-btn svg{pointer-events:none}
  #play-btn{
    width:56px;height:56px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;border-radius:50%;cursor:pointer;
    color:#fff;display:flex;align-items:center;justify-content:center;
    transition:all .2s;
    box-shadow:0 0 20px rgba(192,132,252,.35);
  }
  #play-btn:hover{transform:scale(1.06);box-shadow:0 0 30px rgba(192,132,252,.5)}
  #play-btn:active{transform:scale(.96)}
  #play-btn svg{pointer-events:none}
  .shuffle-active{color:var(--accent) !important}
  .repeat-active{color:var(--accent3) !important}

  /* Volume */
  #vol-row{
    display:flex;align-items:center;gap:10px;
    color:var(--text3);
  }
  #vol-row svg{flex-shrink:0}
  #volume{
    width:90px;height:4px;
    -webkit-appearance:none;appearance:none;
    background:var(--surface3);border-radius:99px;cursor:pointer;outline:none;
  }
  #volume::-webkit-slider-thumb{
    -webkit-appearance:none;width:12px;height:12px;
    border-radius:50%;background:var(--text2);cursor:pointer;
  }
  #volume:hover::-webkit-slider-thumb{background:var(--text)}

  /* ── Player Bar ── */
  #player-bar{
    grid-column:1/-1;grid-row:2;
    background:var(--surface);
    border-top:1px solid var(--border);
    z-index:2;
    display:none;
  }

  /* Drag overlay */
  #drop-overlay{
    display:none;position:fixed;inset:0;z-index:100;
    background:rgba(10,10,15,.85);
    border:2px dashed var(--accent);
    border-radius:20px;
    margin:16px;
    align-items:center;justify-content:center;flex-direction:column;gap:16px;
    color:var(--accent);font-size:18px;font-weight:600;
  }
  #drop-overlay.active{display:flex}

  /* Keyboard hint */
  #kb-hint{
    position:fixed;bottom:20px;right:20px;
    font-size:11px;color:var(--text3);
    line-height:1.8;text-align:right;z-index:1;
    pointer-events:none;
  }
  kbd{
    background:var(--surface2);border:1px solid var(--border);
    border-radius:4px;padding:1px 5px;font-size:10px;font-family:inherit;
  }

  /* Responsive */
  @media(max-width:680px){
    body{grid-template-columns:1fr;grid-template-rows:1fr 180px}
    #sidebar{display:none}
    #main{grid-column:1}
  }
</style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <div id="sidebar-header">
    <span class="app-title">♪ Nesta Player</span>
    <button id="add-btn" onclick="document.getElementById('file-input').click()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Tambah
    </button>
    <input type="file" id="file-input" accept="audio/*" multiple>
  </div>
  <div id="playlist">
    <div class="empty-state" id="empty-msg">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
      <p>Belum ada lagu.<br>Klik <strong>Tambah</strong> atau<br>seret file musik ke sini.</p>
    </div>
  </div>
</aside>

<!-- Main player area -->
<main id="main">
  <div id="vis-wrap">
    <canvas id="visualizer"></canvas>
    <div class="cover-ring" id="cover-ring">
      <div class="cover-inner">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="rgba(192,132,252,.7)" stroke-width="1.5">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <div class="vinyl-hole"></div>
    </div>
  </div>

  <div id="now-playing">
    <div id="track-title">Tidak ada lagu</div>
    <div id="track-sub">Tambahkan file musik untuk memulai</div>
  </div>

  <div id="progress-wrap">
    <div class="time-row">
      <span id="time-cur">0:00</span>
      <span id="time-tot">0:00</span>
    </div>
    <div class="seek-container">
      <div id="seek-fill" style="width:0%"></div>
      <input type="range" id="seek" min="0" max="100" step="0.1" value="0">
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="shuffle-btn" title="Acak">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
        <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="prev-btn" title="Sebelumnya (←)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
      </svg>
    </button>
    <button id="play-btn" title="Play/Pause (Space)">
      <svg id="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="next-btn" title="Berikutnya (→)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="repeat-btn" title="Ulangi">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
    </button>
    <div id="vol-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
    </div>
  </div>
</main>

<!-- Drop overlay -->
<div id="drop-overlay">
  <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
  </svg>
  Lepaskan file musik di sini
</div>

<div id="kb-hint">
  <kbd>Space</kbd> play/pause &nbsp;
  <kbd>←</kbd><kbd>→</kbd> ganti lagu
</div>

<audio id="audio-el"></audio>

<script>
const audio = document.getElementById('audio-el');
const canvas = document.getElementById('visualizer');
const ctx2d = canvas.getContext('2d');
const fileInput = document.getElementById('file-input');
const playlistEl = document.getElementById('playlist');
const emptyMsg = document.getElementById('empty-msg');
const playBtn = document.getElementById('play-btn');
const playIcon = document.getElementById('play-icon');
const seekEl = document.getElementById('seek');
const seekFill = document.getElementById('seek-fill');
const timeCur = document.getElementById('time-cur');
const timeTot = document.getElementById('time-tot');
const volEl = document.getElementById('volume');
const coverRing = document.getElementById('cover-ring');
const trackTitle = document.getElementById('track-title');
const trackSub = document.getElementById('track-sub');
const shuffleBtn = document.getElementById('shuffle-btn');
const repeatBtn = document.getElementById('repeat-btn');

let tracks = [], currentIdx = -1, isPlaying = false;
let shuffle = false, repeat = false;
let audioCtx, analyser, source, dataArr;
let animId;

// ── Resize canvas ──
function resizeCanvas(){
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  ctx2d.scale(window.devicePixelRatio, window.devicePixelRatio);
}
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 50);

// ── Web Audio setup ──
function setupAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;
  dataArr = new Uint8Array(analyser.frequencyBinCount);
  source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
}

// ── Visualizer ──
const colors = ['#c084fc','#a78bfa','#818cf8','#60a5fa','#34d399','#86efac'];
function drawVis(){
  animId = requestAnimationFrame(drawVis);
  const W = canvas.width / window.devicePixelRatio;
  const H = canvas.height / window.devicePixelRatio;
  ctx2d.clearRect(0,0,W,H);

  if(!analyser){
    // idle state: gentle wave
    ctx2d.strokeStyle = 'rgba(192,132,252,.15)';
    ctx2d.lineWidth = 2;
    ctx2d.beginPath();
    const t = Date.now()/1200;
    for(let x=0;x<=W;x++){
      const y = H/2 + Math.sin(x/40+t)*6 + Math.sin(x/20+t*1.5)*3;
      x===0?ctx2d.moveTo(x,y):ctx2d.lineTo(x,y);
    }
    ctx2d.stroke();
    return;
  }

  analyser.getByteFrequencyData(dataArr);
  const bars = dataArr.length;
  const barW = (W - bars*2) / bars;
  const centerX = W/2, centerY = H/2;

  // Background glow when playing
  if(isPlaying){
    const avg = dataArr.reduce((a,b)=>a+b,0)/bars/255;
    const grd = ctx2d.createRadialGradient(centerX,centerY,0,centerX,centerY,H*.7);
    grd.addColorStop(0,`rgba(192,132,252,${avg*.1})`);
    grd.addColorStop(1,'transparent');
    ctx2d.fillStyle=grd;
    ctx2d.fillRect(0,0,W,H);
  }

  // Bars
  for(let i=0;i<bars;i++){
    const val = dataArr[i]/255;
    const bH = val * H * .75;
    const x = i * (barW+2);
    const y = H - bH;
    const color = colors[i % colors.length];
    const grd = ctx2d.createLinearGradient(x,y,x,H);
    grd.addColorStop(0, color);
    grd.addColorStop(1, color.replace('fc','fc')+'22');
    ctx2d.fillStyle = grd;
    ctx2d.beginPath();
    ctx2d.roundRect(x, y, barW, bH, [3,3,0,0]);
    ctx2d.fill();
    // Mirror top
    ctx2d.globalAlpha = .18;
    ctx2d.fillStyle = grd;
    ctx2d.beginPath();
    ctx2d.roundRect(x, 0, barW, val*H*.25, [0,0,3,3]);
    ctx2d.fill();
    ctx2d.globalAlpha = 1;
  }
}
drawVis();

// ── Format time ──
function fmt(s){
  if(!s||isNaN(s)) return '0:00';
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

// ── Clean filename ──
function cleanName(fname){
  return fname.replace(/\.[^.]+$/,'')
    .replace(/^\d+[\s._-]+/,'')
    .replace(/[_]/g,' ');
}

// ── Render playlist ──
function renderPlaylist(){
  emptyMsg.style.display = tracks.length ? 'none' : 'flex';
  const items = playlistEl.querySelectorAll('.track-item');
  items.forEach(el=>el.remove());
  tracks.forEach((t,i)=>{
    const div = document.createElement('div');
    div.className = 'track-item' + (i===currentIdx?' active':'');
    div.dataset.idx = i;
    div.innerHTML = `
      <span class="track-num">${i===currentIdx?'▶':i+1}</span>
      <div class="track-icon">♪</div>
      <div class="track-info">
        <div class="track-name">${t.name}</div>
        <div class="track-dur">${t.duration||'--:--'}</div>
      </div>
      <button class="track-del" data-del="${i}" title="Hapus">✕</button>
    `;
    div.addEventListener('click',(e)=>{
      if(e.target.closest('[data-del]')) return;
      loadTrack(i, true);
    });
    div.querySelector('[data-del]').addEventListener('click',()=>removeTrack(i));
    playlistEl.appendChild(div);
  });
}

// ── Load track ──
function loadTrack(idx, play=false){
  if(idx<0||idx>=tracks.length) return;
  currentIdx = idx;
  const t = tracks[idx];
  audio.src = t.url;
  trackTitle.textContent = t.name;
  trackSub.textContent = 'File lokal · ' + (t.rawname||'');
  seekEl.value = 0;
  seekFill.style.width = '0%';
  timeCur.textContent = '0:00';
  renderPlaylist();
  const item = playlistEl.querySelector('.track-item.active');
  if(item) item.scrollIntoView({behavior:'smooth',block:'nearest'});
  if(play){
    setupAudio();
    if(audioCtx.state==='suspended') audioCtx.resume();
    audio.play();
  }
}

// ── Remove track ──
function removeTrack(idx){
  URL.revokeObjectURL(tracks[idx].url);
  tracks.splice(idx,1);
  if(currentIdx===idx){
    audio.pause();
    isPlaying=false;
    updatePlayBtn();
    coverRing.classList.remove('spinning');
    if(tracks.length>0) loadTrack(Math.min(idx,tracks.length-1),false);
    else{
      currentIdx=-1;
      trackTitle.textContent='Tidak ada lagu';
      trackSub.textContent='Tambahkan file musik untuk memulai';
      timeCur.textContent='0:00';timeTot.textContent='0:00';
      seekFill.style.width='0%';
    }
  } else if(currentIdx>idx){
    currentIdx--;
  }
  renderPlaylist();
}

// ── Add files ──
function addFiles(files){
  const arr = Array.from(files).filter(f=>f.type.startsWith('audio/')||/\.(mp3|flac|ogg|wav|m4a|aac|opus|wma)$/i.test(f.name));
  if(!arr.length) return;
  const pending = arr.length;
  let done = 0;
  arr.forEach(f=>{
    const url = URL.createObjectURL(f);
    const tmp = new Audio();
    tmp.src = url;
    const obj = {name:cleanName(f.name),rawname:f.name,url,duration:null};
    tmp.addEventListener('loadedmetadata',()=>{
      obj.duration = fmt(tmp.duration);
      done++;
      if(done===pending) renderPlaylist();
    },{once:true});
    tmp.addEventListener('error',()=>{done++;if(done===pending)renderPlaylist();},{once:true});
    tracks.push(obj);
    if(tracks.length===arr.length && currentIdx===-1) loadTrack(0,false);
  });
  renderPlaylist();
  if(currentIdx===-1 && tracks.length>0) loadTrack(0,false);
}

fileInput.addEventListener('change',e=>{ addFiles(e.target.files); fileInput.value=''; });

// ── Playback controls ──
function updatePlayBtn(){
  playIcon.innerHTML = isPlaying
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

playBtn.addEventListener('click',()=>{
  if(tracks.length===0){ document.getElementById('file-input').click(); return; }
  setupAudio();
  if(audioCtx.state==='suspended') audioCtx.resume();
  if(isPlaying){ audio.pause(); } else { audio.play(); }
});

audio.addEventListener('play',()=>{ isPlaying=true; updatePlayBtn(); coverRing.classList.add('spinning'); });
audio.addEventListener('pause',()=>{ isPlaying=false; updatePlayBtn(); coverRing.classList.remove('spinning'); });

audio.addEventListener('timeupdate',()=>{
  if(!audio.duration) return;
  const pct = (audio.currentTime/audio.duration)*100;
  seekEl.value = pct;
  seekFill.style.width = pct+'%';
  timeCur.textContent = fmt(audio.currentTime);
  timeTot.textContent = fmt(audio.duration);
});

seekEl.addEventListener('input',()=>{
  if(audio.duration){
    audio.currentTime = (seekEl.value/100)*audio.duration;
    seekFill.style.width = seekEl.value+'%';
  }
});

audio.addEventListener('ended',()=>{
  if(repeat){ audio.play(); return; }
  playNext();
});

function playNext(){
  if(tracks.length===0) return;
  let next;
  if(shuffle) next = Math.floor(Math.random()*tracks.length);
  else next = (currentIdx+1) % tracks.length;
  loadTrack(next, true);
}
function playPrev(){
  if(tracks.length===0) return;
  if(audio.currentTime>3){ audio.currentTime=0; return; }
  const prev = (currentIdx-1+tracks.length) % tracks.length;
  loadTrack(prev, true);
}

document.getElementById('next-btn').addEventListener('click', playNext);
document.getElementById('prev-btn').addEventListener('click', playPrev);

shuffleBtn.addEventListener('click',()=>{
  shuffle=!shuffle;
  shuffleBtn.querySelector('svg').style.stroke = shuffle?'var(--accent)':'currentColor';
});
repeatBtn.addEventListener('click',()=>{
  repeat=!repeat;
  repeatBtn.querySelector('svg').style.stroke = repeat?'var(--accent3)':'currentColor';
});

volEl.addEventListener('input',()=>{ audio.volume = volEl.value; });
audio.volume = 0.8;

// ── Keyboard ──
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();playBtn.click();}
  if(e.code==='ArrowRight'){e.preventDefault();playNext();}
  if(e.code==='ArrowLeft'){e.preventDefault();playPrev();}
});

// ── Drag & drop ──
const dropOverlay = document.getElementById('drop-overlay');
let dragCount=0;
document.addEventListener('dragenter',e=>{
  if([...e.dataTransfer.types].includes('Files')){
    dragCount++;
    dropOverlay.classList.add('active');
  }
});
document.addEventListener('dragleave',()=>{
  dragCount--;
  if(dragCount<=0){dragCount=0;dropOverlay.classList.remove('active');}
});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();
  dragCount=0;
  dropOverlay.classList.remove('active');
  addFiles(e.dataTransfer.files);
});
</script>
</body>
</html>
